{% extends 'accounts/base_auth.html' %}

{% block content %}
<div class="form-group role-select">
    <label for="role-select">Select Role</label>
    <select id="role-select" class="form-control" onchange="window.location.href=this.value">
        <option value="{% url 'student_signup' %}">Student</option>
        <option value="{% url 'staff_signup' %}" selected>Staff</option>
    </select>
</div>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}
        <ul class="error-list">
            {% for error in field.errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
        {% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-submit">Create Account</button>
</form>
{% endblock %}
