{% extends 'accounts/base_auth.html' %}

{% block title %}Staff Sign Up - UniResolve{% endblock %}

{% block content %}
<div class="auth-header">
    <h2>Staff Registration</h2>
    <p>Create your staff account</p>
</div>

<!-- Role Switcher -->
<div class="role-switcher">
    <a href="{% url 'signup_student' %}" class="role-btn">Student</a>
    <a href="{% url 'signup_staff' %}" class="role-btn active">Staff</a>
</div>

<form id="staffSignupForm">
    {% csrf_token %}
    <div class="form-group">
        <label for="first_name">First Name</label>
        <input type="text" id="first_name" name="first_name" class="form-control" required>
        <div id="first_name_error" class="error-message"></div>
    </div>

    <div class="form-group">
        <label for="last_name">Last Name</label>
        <input type="text" id="last_name" name="last_name" class="form-control" required>
        <div id="last_name_error" class="error-message"></div>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" required>
        <div id="email_error" class="error-message"></div>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" required>
        <i class="fa-solid fa-eye-slash password-toggle" onclick="togglePassword('password', this)"></i>
        <!-- Toggle Switch -->
        <div id="password_error" class="error-message"></div>
    </div>

    <!-- Staff Specific Fields -->
    <div class="form-group">
        <label for="employee_id">Employee ID</label>
        <input type="text" id="employee_id" name="employee_id" class="form-control" placeholder="e.g. EMP-001" required>
        <div id="employee_id_error" class="error-message"></div>
    </div>

    <div class="form-group">
        <label for="department">Department</label>
        <select id="department" name="department" class="form-control" required>
            <option value="" disabled selected>Select your department</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}">{{ dept.department_name }}</option>
            {% endfor %}
        </select>
        <div id="department_error" class="error-message"></div>
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
</form>

<div class="auth-footer">
    Already have an account? <a href="{% url 'signin' %}">Log In</a>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('staffSignupForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        // Disable the button and change its text to indicate that the form is being submitted
        // prevents multiple clicks
        submitBtn.disabled = true;
        submitBtn.innerText = 'Creating Account...';

        // Clear previous errors that may have been displayed on the form
        document.querySelectorAll('.error-message').forEach(el => {
            el.innerText = '';
            el.style.display = 'none';
        });

        // Collect form data
        const formData = {
            role: 'Staff',
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            employee_id: document.getElementById('employee_id').value,
            department_id: document.getElementById('department').value // Serializer expects department_id
        };

        // Get the CSRF token from the cookie
        const csrftoken = getCookie('csrftoken');

        try {
            const response = await fetch('/api/accounts/register/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': csrftoken
                },
                body: JSON.stringify(formData) // Convert the JS object to a JSON string
            });

            const data = await response.json();

            if (response.ok) {
                alert('Account created successfully! Redirecting to login...');
                window.location.href = "{% url 'signin' %}"; // Redirect to login
            } else {
                // Handle Errors
                for (const [key, value] of Object.entries(data)) {
                    // Map API field names to Error Div IDs
                    let errorDivId = key + '_error';
                    if (key === 'department_id') errorDivId = 'department_error';

                    const errorDiv = document.getElementById(errorDivId);
                    if (errorDiv) {
                        errorDiv.innerText = Array.isArray(value) ? value[0] : value;
                        errorDiv.style.display = 'block';
                    } else {
                        alert(`Error: ${key} - ${value}`);
                    }
                }
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An unexpected error occurred. Please try again.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Create Account';
        }
    });


</script>
{% endblock %}
